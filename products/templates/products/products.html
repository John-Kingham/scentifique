{% extends "base.html" %}
{% load static %}

{% block content %}
    <!-- Products content -->
    <div class="overlay"></div>
    <div class="container h-100">
        <div class="row my-4">
            <div class="col-12">
                <h1 class="content-heading">Exquisite Hand-Made Candles</h1>
            </div>
        </div>
        <div class="row my-2">
            {% for product in products %}
                <div class="col-md-6 col-lg-4 my-2">
                    <div class="card h-100">
                        {% if product.image %}
                            <a href=""><img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}"></a>
                        {% else %}
                            <a href=""><img src="{{ MEDIA_URL }}noimage.png" class="card-img-top" alt="{{ product.name }}"></a>                        
                        {% endif %}
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{ product.name }}</h5>
                            <p class="small">£{{ product.price }}</p>
                            <p class="card-text">{{ product.description }}</p>
                            <a href="#" class="btn btn-dark mt-auto">View</a>
                        </div>
                    </div>                
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock content %}
